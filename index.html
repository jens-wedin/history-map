<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1b2a4a" />
  <title>Wayback — Discover history around you</title>
  <meta name="description" content="A live map that surfaces the history of places as you walk or drive past them." />

  <!-- Leaflet (map) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="./css/style.css?v=6" />
</head>
<body>
  <div id="map" aria-label="Map of historic places near you"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">🕰️</span>
      <span class="brand-name">Wayback</span>
    </div>
    <div class="topbar-actions">
      <button id="locateBtn" class="icon-btn" title="Center on my location" aria-label="Center on my location">📍</button>
      <button id="followBtn" class="icon-btn" title="Follow me as I move" aria-label="Toggle follow mode">🧭</button>
    </div>
  </header>

  <!-- Status / hint pill -->
  <div id="status" class="status-pill" role="status" aria-live="polite"></div>

  <!-- Detail panel (slides up / in) -->
  <aside id="panel" class="panel" aria-hidden="true">
    <button id="panelClose" class="panel-close" aria-label="Close">✕</button>
    <div id="panelImageWrap" class="panel-image-wrap"></div>
    <div class="panel-body">
      <h2 id="panelTitle" class="panel-title"></h2>
      <p id="panelDistance" class="panel-distance"></p>
      <p id="panelExtract" class="panel-extract"></p>
      <div class="panel-actions">
        <button id="panelFull" class="btn btn-primary">Read full view</button>
        <a id="panelWiki" class="btn btn-ghost" target="_blank" rel="noopener">Open on Wikipedia ↗</a>
      </div>
    </div>
  </aside>

  <!-- Full reading view -->
  <div id="fullview" class="fullview" aria-hidden="true">
    <header class="fullview-bar">
      <button id="fullClose" class="icon-btn" aria-label="Back to map">← Back</button>
      <span id="fullTitle" class="fullview-title"></span>
      <a id="fullWiki" class="icon-btn" target="_blank" rel="noopener" title="Open on Wikipedia">↗</a>
    </header>
    <div id="fullContent" class="fullview-content"></div>
  </div>

  <!-- First-run intro -->
  <div id="intro" class="intro" aria-hidden="false">
    <div class="intro-card">
      <div class="intro-icon">🗺️</div>
      <h1>Wayback</h1>
      <p>Discover the history of places as you walk or drive past them. Stories pop up when you get close — no searching required.</p>
      <button id="startBtn" class="btn btn-primary btn-block">Use my location & start</button>
      <button id="demoBtn" class="btn btn-ghost btn-block">Explore a demo (Rome)</button>
      <p class="intro-fine">Your location stays on your device. History is fetched live from Wikipedia.</p>
    </div>
  </div>

  <!-- Leaflet (map) JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="./js/app.js?v=6"></script>
</body>
</html>
